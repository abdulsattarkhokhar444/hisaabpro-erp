<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HisaabPro ERP - UI Demo v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #D1F2EB;
            color: #134E4A;
            padding: 20px;
            line-height: 1.6;
        }
        .page-title {
            text-align: center;
            color: #0D9488;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .phone-mockup {
            max-width: 380px;
            margin: 0 auto;
            background: #1f2937;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .screen {
            background: #D1F2EB;
            border-radius: 32px;
            overflow: hidden;
            min-height: 780px;
        }
        .header {
            background: linear-gradient(135deg, #0D9488, #5EEAD4);
            color: white;
            padding: 24px 20px;
            border-radius: 0 0 28px 28px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }
        .header p {
            font-size: 13px;
            opacity: 0.9;
        }
        .user-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(13, 148, 136, 0.15);
            padding: 20px;
            margin: 16px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px;
        }
