<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HisaabPro ERP - UI Demo v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #D1F2EB;
            color: #134E4A;
            padding: 20px;
            line-height: 1.6;
        }
        .page-title {
            text-align: center;
            color: #0D9488;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .phone-mockup {
            max-width: 380px;
            margin: 0 auto;
            background: #1f2937;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .screen {
            background: #D1F2EB;
            border-radius: 32px;
            overflow: hidden;
            min-height: 780px;
        }
        .header {
            background: linear-gradient(135deg, #0D9488, #5EEAD4);
            color: white;
            padding: 24px 20px;
            border-radius: 0 0 28px 28px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }
        .header p {
            font-size: 13px;
            opacity: 0.9;
        }
        .user-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px;
        }
        .kpi-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 16px;
            text-align: center;
        }
        .kpi-icon {
            width: 48px;
            height: 48px;
            background: #0D9488;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: white;
            font-size: 20px;
        }
        .kpi-value {
            font-size: 22px;
            font-weight: 700;
            color: #0D9488;
        }
        .kpi-label {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 24px 16px 12px;
            color: #0D9488;
        }
        .list-item {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 14px;
            margin: 0 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-icon {
            width: 44px;
            height: 44px;
            background: #0D9488;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }
        .badge {
            background: #10B981;
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-primary {
            background: #0D9488;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            width: calc(100% - 32px);
            margin: 16px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        .sdd-note {
            background: rgba(94, 234, 212, 0.3);
            border-left: 4px solid #0D9488;
            padding: 12px 16px;
            margin: 20px 16px;
            border-radius: 12px;
            font-size: 12px;
        }
        .footer-text {
            text-align: center;
            opacity: 0.6;
            font-size: 12px;
            margin: 32px 16px 16px;
        }
    </style>
</head>
<body>
    <div class="page-title">HisaabPro ERP v1.0</div>
    <div class="subtitle">UI/UX Demo - As per SDD Section 2 & 8 | Feature A01</div>

    <div class="phone-mockup">
        <div class="screen">
            <div class="header">
                <div class="header-top">

                    </div>
                    <div class="user-icon">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>

            <div class="section-title">Dashboard Overview</div>
            <div class="kpi-grid">

                    <div class="kpi-icon"><i class="fas fa-wallet"></i></div>
                    <div class="kpi-value">Rs. 2.5L</div>
                    <div class="kpi-label">Total Sales</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-users"></i></div>
                    <div class="kpi-value">12</div>
                    <div class="kpi-label">Active Salesmen</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-box"></i></div>
                    <div class="kpi-value">248</div>
                    <div class="kpi-label">Products</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-clock"></i></div>
                    <div class="kpi-value">18</div>
                    <div class="kpi-label">Pending Orders</div>
                </div>
            </div>

            <div class="section-title
